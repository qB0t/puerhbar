<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Puerh Bar — Tea Menu</title>
<meta name="description" content="Puerh Bar — a private tea collection, brewed gong fu style, for friends.">
<style>
  :root{
    --cream:#FBF6EC; --ink:#2B2622; --accent:#7A3B1E;
    --gold:#A9802B; --muted:#6E655B; --rule:#C9B79C;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--cream); color:var(--ink);
    font-family:Georgia,'Times New Roman',serif;
    line-height:1.5; -webkit-font-smoothing:antialiased;
  }
  .frame{max-width:760px; margin:0 auto; padding:24px 30px 60px;}

  .langbar{display:flex; justify-content:flex-end; margin-bottom:6px;}
  .toggle{display:inline-flex; border:1px solid var(--rule); border-radius:30px; overflow:hidden;}
  .toggle button{
    font-family:inherit; font-size:13px; letter-spacing:.5px; cursor:pointer;
    border:0; background:transparent; color:var(--muted); padding:5px 14px;
  }
  .toggle button.active{background:var(--accent); color:var(--cream);}

  header{text-align:center; margin-bottom:6px;}
  h1{font-size:46px; letter-spacing:3px; color:var(--accent); margin:0 0 2px; font-weight:700;}
  .tagline{font-style:italic; color:var(--muted); font-size:17px; margin:0;}
  .toprule{border:0; border-top:2px solid var(--accent); margin:16px 0 26px;}

  section{margin-bottom:30px;}
  h2{color:var(--accent); font-size:20px; letter-spacing:1px; text-transform:uppercase; margin:0 0 4px; font-weight:700;}
  .sectrule{border:0; border-top:1.4px solid var(--gold); margin:0 0 12px;}

  .item{
    display:grid; grid-template-columns:minmax(0,1fr) max-content max-content;
    column-gap:14px; padding:7px 0; border-bottom:1px dotted #E2D6C0;
  }
  .item:last-child{border-bottom:0;}
  .name{font-weight:700; font-size:17px; grid-column:1; align-self:start;}
  .note{grid-column:1; font-style:italic; color:var(--muted); font-size:13.5px; margin-top:2px;}
  .size{grid-column:2; grid-row:1; text-align:right; color:var(--gold); font-size:14px; white-space:nowrap; align-self:start;}
  .year{grid-column:3; grid-row:1; text-align:right; color:var(--muted); font-size:14px; white-space:nowrap; align-self:start;}

  footer{margin-top:34px; padding-top:14px; border-top:2px solid var(--accent); text-align:center;}
  .footnote{font-style:italic; color:var(--muted); font-size:14px; margin:0 0 14px;}
  .map{
    display:inline-flex; align-items:center; gap:8px; text-decoration:none;
    color:var(--cream); background:var(--accent); padding:10px 20px;
    border-radius:30px; font-size:15px; letter-spacing:.3px; transition:background .15s ease;
  }
  .map:hover{background:#5e2d16;}
  .map svg{width:17px; height:17px; fill:var(--cream);}

  @media (max-width:560px){
    .frame{padding:18px 18px 48px;}
    h1{font-size:34px; letter-spacing:2px;}
    .tagline{font-size:15px;}
    .item{column-gap:10px;}
    .name{font-size:15.5px;}
    .note{font-size:12.5px;}
    .size,.year{font-size:12.5px;}
  }
  @media print{
    body{background:#fff;}
    .langbar{display:none;}
    .map{color:#000;background:none;border:1px solid var(--accent);}
  }
</style>
</head>

  </footer>
</div>

const esc = s => String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
const menuEl = document.getElementById("menu");

function render(lang){
  const i = lang === "ru" ? 1 : 0;
  document.documentElement.lang = lang;
  document.getElementById("tagline").textContent = UI[lang].tag;
  document.getElementById("footnote").textContent = UI[lang].foot;
  document.getElementById("maptext").textContent = UI[lang].map;
  menuEl.innerHTML = "";
  for (const sec of MENU){
    const title = sec[i], items = sec[2];
    const el = document.createElement("section");
    el.innerHTML = `<h2>${esc(title)}</h2><hr class="sectrule">`;
    for (const it of items){
      const name = it[i], size = it[2], year = it[3], note = it[4 + i];
      const sizeTxt = lang === "ru" ? (SIZE_RU[size] || size) : size;
      const yearTxt = lang === "ru" ? (META_RU[year] || year) : year;
      const row = document.createElement("div");
      row.className = "item";
      row.innerHTML =
        `<div class="name">${esc(name)}</div>`+
        `<div class="size">${esc(sizeTxt)}</div>`+
        `<div class="year">${year ? esc(yearTxt) : ""}</div>`+
        `<div class="note">${esc(note)}</div>`;
      el.appendChild(row);
    }
    menuEl.appendChild(el);
  }
  document.querySelectorAll("#toggle button").forEach(b =>
    b.classList.toggle("active", b.dataset.lang === lang));
  try { localStorage.setItem("puerhbar_lang", lang); } catch(e){}
}

document.getElementById("toggle").addEventListener("click", e => {
  const b = e.target.closest("button");
  if (b) render(b.dataset.lang);
});

let start = "en";
try { const s = localStorage.getItem("puerhbar_lang"); if (s) start = s; } catch(e){}
render(start);
